<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintSolutions - Servidor de Impresión</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 5px; }
        p { color: #64748b; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 30px; text-align: center; color: #94a3b8; cursor: pointer; transition: all 0.3s; }
        .drop-zone:hover { border-color: #3b82f6; color: #3b82f6; background-color: #eff6ff; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #2563eb; }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; display: none; }
        .success { background-color: #dcfce7; color: #166534; }
        .error { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PrintSolutions Ltda.</h1>
        <p>Servidor Centralizado de Impresión (Debian 13)</p>
        
        <form id="printForm" enctype="multipart/form-data">
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <span>Arrastra tu archivo aquí o haz clic para buscar</span>
                <input type="file" id="fileInput" name="archivo" style="display:none" required>
            </div>
            <div id="fileNameDisplay" style="margin-top:10px; font-size:13px; color:#334155; text-align:center; font-weight:500;"></div>
            <button type="submit">Enviar Documento a Cola</button>
        </form>

        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        
        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                fileNameDisplay.textContent = "Archivo seleccionado: " + fileInput.files[0].name;
            }
        });

        document.getElementById('printForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusBox = document.getElementById('statusBox');
            const formData = new FormData();
            formData.append('archivo', fileInput.files[0]);

            statusBox.style.display = 'block';
            statusBox.className = 'status';
            statusBox.textContent = 'Enviando archivo al servidor Debian...';

            try {
                const response = await fetch('/api/imprimir', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (response.ok) {
                    statusBox.classList.add('success');
                    statusBox.textContent = '¡Éxito! ' + result.message;
                } else {
                    statusBox.classList.add('error');
                    statusBox.textContent = 'Error: ' + result.error;
                }
            } catch (err) {
                statusBox.classList.add('error');
                statusBox.textContent = 'No se pudo conectar con el servidor backend.';
            }
        });
  </script>
</body>
</html>
